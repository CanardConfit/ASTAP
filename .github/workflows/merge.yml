name: auto-merge-astap-mirror
run-name: Merge ASTAP auto Pull Request
on:
  #push:
  #  branches: [ tmp ]
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      forced:
        description: 'Force merge without time checking?'
        required: false
        default: 'false'
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    container:
      image: canardconfit/astap-scripts:2.0.1
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: /tmp/astap
      - name: Launch AutoMerge script
        run: yarn start autoMerge ${{ github.event.inputs.forced == 'true' }} false -t ${{ secrets.GITHUB_TOKEN }}
        working-directory: /app

  release-binaries:
    needs: [auto-merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: canardconfit/astap-scripts:2.0.1
    steps:
      - name: Create ASTAP binary release draft if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn start releaseBinaries --draft --repo /tmp/astap
        working-directory: /app
